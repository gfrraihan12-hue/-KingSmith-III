name: Update YouTube Playlist

on:
  schedule:
    - cron: '*/30 * * * *'   # tiap 30 menit
  workflow_dispatch:          # bisa dipicu manual dari tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Write cookies file (kalau secret YOUTUBE_COOKIES tersedia)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
          fi

      - name: Run update script
        run: python update_playlist.py

      - name: Commit & push kalau ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u8
          git diff --staged --quiet || git commit -m "Auto-update playlist $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
