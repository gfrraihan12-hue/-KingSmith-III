name: Update Playlist

on:
  schedule:
    - cron: '0 3 * * *'   # tiap hari jam 03:00 UTC (10:00 WIB)
  workflow_dispatch:        # bisa dipicu manual dari tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_playlist.py

      - name: Commit & push kalau ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u8
          git diff --staged --quiet || git commit -m "Auto-update playlist $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
