name: Check Dead Channels

on:
  workflow_dispatch:        # jalankan manual kapan saja dari tab Actions
  schedule:
    - cron: '0 4 * * 0'    # otomatis tiap Minggu jam 04:00 UTC (11:00 WIB)

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run channel checker
        run: python check_channels.py

      - name: Upload hasil sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: channel-check-results
          path: |
            dead_channels.txt
            live_channels.txt
          retention-days: 30
