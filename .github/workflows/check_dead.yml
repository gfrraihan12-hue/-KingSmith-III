name: Check Dead Channels

on:
  workflow_dispatch:        # jalankan manual kapan saja dari tab Actions
  schedule:
    - cron: '0 4 * * 0'    # otomatis tiap Minggu jam 04:00 UTC (11:00 WIB)

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cek channel mati & pindah ke Dead Channels
        run: python check_channels.py

      - name: Update playlist.m3u8
        run: python update_playlist.py

      - name: Commit & push perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels_static.m3u8 playlist.m3u8
          git diff --staged --quiet || git commit -m "Auto: pindah channel mati ke Dead Channels $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Upload laporan sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: channel-check-results
          path: |
            dead_channels.txt
            live_channels.txt
          retention-days: 30
